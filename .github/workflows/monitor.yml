name: Kontrola Liptovska Osada

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:


jobs:
  kontrola:

    runs-on: ubuntu-latest

    steps:

    - name: Stiahnutie kodu
      uses: actions/checkout@v4


    - name: Nastavenie Pythonu
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"


    - name: Instalacia balikov
      run: |
        pip install -r requirements.txt


    - name: Spustenie kontroly
      run: |
        python monitor.py
