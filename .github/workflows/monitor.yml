name: Kontrola Liptovska Osada

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:


jobs:
  kontrola:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

    - name: Stiahnutie kodu
      uses: actions/checkout@v4


    - name: Nastavenie Pythonu
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"


    - name: Instalacia balikov
      run: |
        pip install -r requirements.txt


    - name: Spustenie kontroly
      run: |
        python monitor.py


    - name: Ulozenie noveho stavu
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add page_hash.txt
        git commit -m "Aktualizacia stavu stranky" || exit 0
        git push
