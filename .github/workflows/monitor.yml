name: Kontrola Liptovska Osada

on:
  schedule:
    - cron: "0 * * * *"

  workflow_dispatch:


jobs:
  kontrola:

    runs-on: ubuntu-latest

    permissions:
      contents: read


    steps:

    - name: Stiahnutie kodu
      uses: actions/checkout@v4


    - name: Obnovenie ulozeneho stavu
      uses: actions/cache@v4
      with:
        path: documents.json
        key: liptovska-hash
        restore-keys: |
          liptovska-hash-


    - name: Nastavenie Pythonu
      uses: actions/setup-python@v5
      with:
        python-version: "3.x"


    - name: Instalacia balikov
      run: |
        pip install -r requirements.txt


    - name: Spustenie kontroly
      run: |
        python monitor.py
